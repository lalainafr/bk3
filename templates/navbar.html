{% load static %}

<nav
    class="navbar navbar-expand-lg navbar-light fixed-top py-3 bg-transparent"
    id="mainNav"
>
    <!-- box-shadow: 10px 5px 15px rgba(81, 79, 79, 1.8); -->
    <div class="container px-4 px-lg-5">
        <a class="navbar-brand" href="{% url 'home' %}">
            <img
                src=" {% static 'img/logo1.jpg' %}"
                alt="..."
                style="width: 12%; height: auto;;"
                class=" rounded-4  shadow-lg shadow-dark bg-dark opacity-50"
            />
        </a>




        <!-- Message  -->
        {% if messages %} {% for message in messages %}
        <div
            class="alert alert-{{message.tags}} alert-dismissible fade show auto-hide shadow-lg rounded-5 opacity-75"
            role="alert"
        >
            {{message}}
        </div>
        {% endfor %} {% endif %}
        <button
            class="navbar-toggler navbar-toggler-right"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarResponsive"
            aria-controls="navbarResponsive"
            aria-expanded="false"
            aria-label="Toggle navigation"
        >
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarResponsive">
            <ul class="navbar-nav ms-auto my-2 my-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="#about">Film</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#Offre">Evenement</a>
                </li>
                <!-- <li class="nav-item">
                    <a class="nav-link" href="#contact">Contact</a>
                </li> -->
                {% if user.is_authenticated %}
                <li class="nav-item">
                    <a class="nav-link opacity-75" href="{% url 'logout' %}"
                        >Logout</a
                    >
                </li>
                <li class="nav-item">
                    <i
                        class="fa-regular fa-circle-user fa-xl"
                        style="color: rgb(157, 143, 143)"
                    ></i>
                </li>
                <li class="nav-item">
                    <p
                        class="nav-link"
                        style="font-size: 10px; color: rgb(157, 143, 143)"
                    >
                        {{user.first_name}} {{user.last_name | upper}}
                    </p>
                </li>

                {% else %}
                <li class="nav-item">
                    <a class="nav-link opacity-75" href="{% url 'login' %}"
                        >Login</a
                    >
                </li>
                <li class="nav-item">
                    <i
                        class="fa-regular fa-circle-user fa-xl"
                        style="color: rgb(157, 143, 143)"
                    ></i>
                </li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>


<section class="masthead">
    <div class="container px-4 px-lg-5 h-100" background-image: url("img/bg-masthead.jpg")>
        <div
            class="row gx-4 gx-lg-5 h-100 align-items-center justify-content-center text-center"
        >

<script>
    document.addEventListener("DOMContentLoaded", function () {
        document.querySelectorAll(".auto-hide").forEach(function (alert) {
            setTimeout(function () {
                const bsAlert = bootstrap.Alert.getOrCreateInstance(alert);
                bsAlert.close();
            }, 5000);
        });
    });
</script>
