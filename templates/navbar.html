{% load static %}

<nav
    class="navbar navbar-expand-lg navbar-light fixed-top py-3 bg-transparent"
    id="mainNav"
>
    <div class="container px-4 px-lg-5">
        <a class="navbar-brand" href="#page-top">
            <img
                src=" {% static 'img/logo.png' %}"
                alt="..."
                style="
                    width: 80px;
                    height: 80px;
                    box-shadow: 10px 5px 15px rgb(85, 75, 75, 0.25);
                "
        /></a>
 <!-- Message  -->
        {% if messages %} {% for message in messages %}
        <div
            class="alert alert-{{message.tags}}  shadow-lg rounded-5 opacity-75"
            role="alert"
        >
            {{message}}
        </div>
        {% endfor %} {% endif %}
        <button
            class="navbar-toggler navbar-toggler-right"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarResponsive"
            aria-controls="navbarResponsive"
            aria-expanded="false"
            aria-label="Toggle navigation"
        >
            <span class="navbar-toggler-icon"></span>
        </button>
        <div
            class="collapse navbar-collapse d-flex justify-content-end"
            id="navbarResponsive"
        >
            <div class="row">

                    <ul class="navbar-nav ms-auto my-2 my-lg-0">
                        <div class="d-flex mx-5 px-5">
                            <li class="nav-item">
                                <a class="nav-link" href="#about">About</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#services"
                                    >Services</a
                                >
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#contact">Contact</a>
                            </li>
                        </div>
                        <div class="d-flex mx-5 px-5">
                          
                            {% if user.is_authenticated %}
                            <li class="nav-item">
                                <a class="nav-link mx-3 px-4 " href="{% url 'logout' %}">LOGOUT</a>
                            </li> 
                              <li class="nav-item ">
                               <i class="fa-regular fa-circle-user fa-xl" style="color: white;"></i>
                            </li>
                            <li class="nav-item">
                                <p class="text-white nav-link border rounded-4 mx-2 px-1 opacity-50 shadow-light shadow-lg bg-ligth" style="font-size: 12px;"> {{user.first_name}}  {{user.last_name | upper}}</p>
                            </li>

                            {% else %}
                             <li class="nav-item">
                                <a class="nav-link mx-3 px-4" href="{% url 'login'%}">LOGIN</a>
                            </li>
                              <li class="nav-item ">
                               <i class="fa-regular fa-circle-user fa-xl" style="color: white;"></i>
                            </li>
                            {% endif %}

                        </div>
                    </ul>
                </div>
            </div>
        </div>
    </div>
      
</nav>
