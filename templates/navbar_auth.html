{% load static %}

<nav
    class="navbar navbar-expand-lg navbar-light fixed-top py-3 bg-transparent"
    id="mainNav"
>
    <div class="container px-4 px-lg-5">
        <a class="navbar-brand" href="#page-top">
            <img
                src=" {% static 'img/logo.png' %}"
                alt="..."
                style="
                    width: 80px;
                    height: 80px;
                    box-shadow: 10px 5px 15px rgb(85, 75, 75, 0.25);
                "
        /></a>
        <!-- Message  -->
        {% if messages %} {% for message in messages %}
        <div
            class="alert alert-{{message.tags}}  alert-dismissible fade show auto-hide shadow-lg rounded-5 opacity-75"
            role="alert"
        >
            {{message}}
        </div>
        {% endfor %} {% endif %}
        <button
            class="navbar-toggler navbar-toggler-right"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarResponsive"
            aria-controls="navbarResponsive"
            aria-expanded="false"
            aria-label="Toggle navigation"
        >
            <span class="navbar-toggler-icon"></span>
        </button>
        <div
            class="collapse navbar-collapse justify-content-end"
            id="navbarResponsive"
        >
            <ul class="navbar-nav ms-auto my-2 my-lg-0">
                <li class="nav-item">
                    <a
                        class="nav-link text-light opacity-50"
                        href="{% url 'home' %}"
                        >Home</a
                    >
                </li>
            </ul>
        </div>
    </div>
</nav>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        document.querySelectorAll(".auto-hide").forEach(function (alert) {
            setTimeout(function () {
                const bsAlert = bootstrap.Alert.getOrCreateInstance(alert);
                bsAlert.close();
            }, 5000);
        });
    });
</script>
